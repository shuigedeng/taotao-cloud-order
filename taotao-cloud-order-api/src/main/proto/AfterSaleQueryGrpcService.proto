syntax = "proto3";

package com.taotao.cloud.order.api.grpc;

option java_multiple_files = true;
option java_package = "com.taotao.cloud.order.api.grpc";
option java_outer_classname = "AfterSaleQueryGrpcServiceProto";
//option objc_class_prefix = "HLW";

service AfterSaleQueryGrpcService {
  rpc insertDeviceFix (AfterSaleGrpcQuery) returns (AfterSaleGrpcQueryResponse){}
}

message AfterSaleGrpcQuery {
  string id = 1;
}

message AfterSaleGrpcQueryResponse {
  bool reply = 1;
}
