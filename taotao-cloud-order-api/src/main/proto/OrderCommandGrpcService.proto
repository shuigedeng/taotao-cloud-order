syntax = "proto3";

package com.taotao.cloud.order.api.grpc;

option java_multiple_files = true;
option java_package = "com.taotao.cloud.order.api.grpc";
option java_outer_classname = "OrderCommandGrpcServiceProto";
//option objc_class_prefix = "HLW";

service OrderCommandGrpcService {
  rpc insertOrder (OrderGrpcCommand) returns (OrderGrpcCommandResponse){}
}

message OrderGrpcCommand {
  string id = 1;
}

message OrderGrpcCommandResponse {
  bool reply = 1;
}

