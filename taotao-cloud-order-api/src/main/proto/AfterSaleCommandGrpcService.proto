syntax = "proto3";

package com.taotao.cloud.order.api.grpc;

option java_multiple_files = true;
option java_package = "com.taotao.cloud.order.api.grpc";
option java_outer_classname = "AfterSaleCommandGrpcServiceProto";
//option objc_class_prefix = "HLW";

service AfterSaleCommandGrpcService {
  rpc insertDeviceFix (AfterSaleGrpcCommand) returns (AfterSaleGrpcCommandResponse){}
}

message AfterSaleGrpcCommand {
  string id = 1;
}

message AfterSaleGrpcCommandResponse {
  bool reply = 1;
}
